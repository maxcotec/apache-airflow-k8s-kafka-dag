apiVersion: v1
kind: Service
metadata:
  name: kafka
  namespace: kafka
spec:
  clusterIP: None
  selector:
    app: kafka
  ports:
    - name: broker
      port: 9092
    - name: controller
      port: 9093
---

apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: kafka
  namespace: kafka
spec:
  serviceName: kafka
  replicas: 1
  selector:
    matchLabels:
      app: kafka
  template:
    metadata:
      labels:
        app: kafka
    spec:
      containers:
        - name: kafka
          image: apache/kafka:4.1.1
          ports:
            - containerPort: 9092
            - containerPort: 9093
          env:
          - name: KAFKA_NODE_ID
            value: "1"

          - name: KAFKA_PROCESS_ROLES
            value: "broker,controller"

          - name: KAFKA_CLUSTER_ID
            value: "5L6g3nShT-eMCtK--X86sw"

          - name: KAFKA_CONTROLLER_QUORUM_VOTERS
            value: "1@kafka.kafka.svc.cluster.local:9093"

          - name: KAFKA_LISTENERS
            value: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093

          - name: KAFKA_ADVERTISED_LISTENERS
            value: PLAINTEXT://kafka.kafka.svc.cluster.local:9092

          - name: KAFKA_ADVERTISED_CONTROLLER_LISTENERS
            value: CONTROLLER://kafka.kafka.svc.cluster.local:9093

          - name: KAFKA_LISTENER_SECURITY_PROTOCOL_MAP
            value: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT

          - name: KAFKA_CONTROLLER_LISTENER_NAMES
            value: CONTROLLER

          - name: KAFKA_INTER_BROKER_LISTENER_NAME
            value: PLAINTEXT

          - name: KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR
            value: "1"

          - name: KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR
            value: "1"

          - name: KAFKA_TRANSACTION_STATE_LOG_MIN_ISR
            value: "1"

          - name: KAFKA_AUTO_CREATE_TOPICS_ENABLE
            value: "true"
